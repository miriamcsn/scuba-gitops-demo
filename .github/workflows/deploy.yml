# CI only. Builds backend + frontend images and pushes them to GHCR.
# Deployment is handled by Flux (GitOps pull) — see clusters/demo/ — so there is
# no deploy job and no self-hosted runner here anymore.
name: Build & Push Images

on:
  push:
    branches: [main]
    # Skip rebuilds for changes that don't affect the images. Critically, this
    # stops the Flux image-automation bot's tag-bump commits (which only touch
    # clusters/**) from re-triggering a build -> avoids an infinite loop.
    paths-ignore:
      - 'clusters/**'
      - 'docs/**'
      - '**.md'
  workflow_dispatch:   # manual trigger from the Actions tab

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: miriamcsn

jobs:
  build:
    name: Build & push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute sortable image tag
        id: tag
        # Format: main-<unix-timestamp>-<short-sha>
        # The timestamp lets Flux's ImagePolicy order tags numerically and pick
        # the newest. Must stay in sync with the pattern in clusters/wl-a/image-automation.yaml.
        run: echo "tag=main-$(date -u +%s)-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU (for amd64 builds on any host arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/scuba-divelog-backend:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/scuba-divelog-backend:latest

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/scuba-divelog-frontend:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/scuba-divelog-frontend:latest

      - name: Summary
        run: |
          echo "Pushed images tagged: ${{ steps.tag.outputs.tag }} (and :latest)" >> "$GITHUB_STEP_SUMMARY"
          echo "Flux will detect the new tag and roll it out to the cluster automatically." >> "$GITHUB_STEP_SUMMARY"
