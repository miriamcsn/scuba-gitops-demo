<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scuba Dive Log</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐡</text></svg>" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(180deg, #0c4a6e 0%, #0e7490 50%, #155e75 100%);
            min-height: 100vh;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 1rem;
            padding: 1.5rem;
        }
        .card h2 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }
        input, select, textarea {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 0.5rem 0.75rem;
            border-radius: 0.5rem;
            width: 100%;
        }
        input::placeholder, textarea::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        button {
            background: #06b6d4;
            color: white;
            padding: 0.5rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 500;
            transition: background 0.2s;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background: #0891b2;
        }
        .list-item {
            background: rgba(255, 255, 255, 0.08);
            padding: 0.75rem;
            border-radius: 0.5rem;
            margin-bottom: 0.5rem;
        }
        .rating { color: #fbbf24; }
        label {
            font-size: 0.875rem;
            color: rgba(255, 255, 255, 0.8);
            display: block;
            margin-bottom: 0.25rem;
        }
        .field { margin-bottom: 0.75rem; }
        select option { color: black; }
    </style>
</head>
<body>
    <div class="w-full bg-cyan-950 border-b border-cyan-700 text-center py-2 px-4 text-sm text-cyan-300 font-medium tracking-wide">
        🔐 v3 &mdash; Sealed Secrets &nbsp;|&nbsp; 🌐 External DNS
    </div>

    <header class="max-w-6xl mx-auto pt-8 pb-4 px-6">
        <h1 class="text-4xl font-bold">🤿 Scuba Dive Log</h1>
        <p class="text-cyan-100 mt-2">Built for divers, deployed on NKP.</p>
    </header>

    <main class="max-w-6xl mx-auto px-6 pb-12 space-y-6">

        <!-- Sites -->
        <section class="grid md:grid-cols-2 gap-6">
            <div class="card">
                <h2>🏖️ Sites</h2>
                <div id="sites-list" class="space-y-2">Loading...</div>
            </div>
            <div class="card">
                <h2>➕ Add a Site</h2>
                <form id="site-form" class="space-y-1">
                    <div class="field"><label>Name</label><input name="name" required placeholder="e.g. Tubbataha Reef" /></div>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="field"><label>City</label><input name="city" /></div>
                        <div class="field"><label>Country</label><input name="country" /></div>
                    </div>
                    <div class="field"><label>Typical Max Depth (m)</label><input name="typical_max_depth_m" type="number" step="0.1" /></div>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="field"><label>Visibility</label>
                            <select name="typical_visibility">
                                <option value="">--</option><option>poor</option><option>fair</option><option>good</option><option>excellent</option>
                            </select>
                        </div>
                        <div class="field"><label>Current</label>
                            <select name="current_strength">
                                <option value="">--</option><option>none</option><option>mild</option><option>strong</option>
                            </select>
                        </div>
                    </div>
                    <div class="field"><label>Marine Life</label><input name="marine_life" placeholder="turtles, reef sharks..." /></div>
                    <button type="submit">Add Site</button>
                </form>
            </div>
        </section>

        <!-- Divers -->
        <section class="grid md:grid-cols-2 gap-6">
            <div class="card">
                <h2>🧜 Divers</h2>
                <div id="divers-list" class="space-y-2">Loading...</div>
            </div>
            <div class="card">
                <h2>➕ Add a Diver</h2>
                <form id="diver-form" class="space-y-1">
                    <div class="field"><label>Name</label><input name="name" required /></div>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="field"><label>Age</label><input name="age" type="number" /></div>
                        <div class="field"><label>City</label><input name="city" /></div>
                    </div>
                    <div class="field"><label>Scuba School</label><input name="school" /></div>
                    <div class="field"><label>Cert Level</label>
                        <select name="cert_level">
                            <option value="">--</option>
                            <option>Open Water</option><option>Advanced</option><option>Rescue</option><option>Divemaster</option><option>Instructor</option>
                        </select>
                    </div>
                    <button type="submit">Add Diver</button>
                </form>
            </div>
        </section>

        <!-- Dives -->
        <section class="grid md:grid-cols-2 gap-6">
            <div class="card">
                <h2>🐠 Dives</h2>
                <div id="dives-list" class="space-y-2">Loading...</div>
            </div>
            <div class="card">
                <h2>➕ Log a Dive</h2>
                <form id="dive-form" class="space-y-1">
                    <div class="grid grid-cols-2 gap-3">
                        <div class="field"><label>Diver</label><select name="diver_id" id="dive-diver-select" required></select></div>
                        <div class="field"><label>Site</label><select name="site_id" id="dive-site-select" required></select></div>
                    </div>
                    <div class="field"><label>Date & Time</label><input name="date" type="datetime-local" required /></div>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="field"><label>Duration (min)</label><input name="duration_min" type="number" required /></div>
                        <div class="field"><label>Max Depth (m)</label><input name="max_depth_m" type="number" step="0.1" required /></div>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="field"><label>Water Temp (°C)</label><input name="water_temp_c" type="number" step="0.1" /></div>
                        <div class="field"><label>Gas Mix</label>
                            <select name="gas_mix">
                                <option value="">--</option><option>air</option><option>nitrox32</option><option>nitrox36</option><option>trimix</option>
                            </select>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="field"><label>Tank Start (bar)</label><input name="tank_pressure_start_bar" type="number" /></div>
                        <div class="field"><label>Tank End (bar)</label><input name="tank_pressure_end_bar" type="number" /></div>
                    </div>
                    <div class="field"><label>Buddy</label><input name="buddy" /></div>
                    <div class="field"><label>Notes</label><textarea name="notes" rows="2"></textarea></div>
                    <div class="field"><label>Rating (1–5)</label>
                        <select name="rating">
                            <option value="">--</option><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option>
                        </select>
                    </div>
                    <button type="submit">Log Dive</button>
                </form>
            </div>
        </section>

        <!-- Stats -->
        <section class="card">
            <h2>📊 Diver Stats</h2>
            <div class="flex gap-3 mb-4 items-end">
                <div class="flex-1">
                    <label>Pick a diver</label>
                    <select id="stats-diver-select"></select>
                </div>
                <button id="stats-btn">Get Stats</button>
            </div>
            <div id="stats-output" class="text-sm"></div>
        </section>

    </main>

    <script>
        // ----- API base URL -----
        // When served from nginx in a container, we'll use /api as a proxy path.
        // For local dev (file:// or python -m http.server), hit the backend directly.
        const API_BASE = '/api';

        // ----- helpers -----
        async function api(path, opts = {}) {
            const res = await fetch(API_BASE + path, {
                headers: { 'Content-Type': 'application/json' },
                ...opts,
            });
            if (!res.ok) {
                const err = await res.text();
                throw new Error(`${res.status}: ${err}`);
            }
            return res.json();
        }

        const INT_FIELDS = ['age', 'duration_min', 'tank_pressure_start_bar', 'tank_pressure_end_bar', 'rating', 'diver_id', 'site_id'];
        const FLOAT_FIELDS = ['typical_max_depth_m', 'max_depth_m', 'water_temp_c'];

        function formToObj(form) {
            const data = {};
            for (const [k, v] of new FormData(form)) {
                if (v === '' || v === null) continue;
                if (INT_FIELDS.includes(k)) data[k] = parseInt(v);
                else if (FLOAT_FIELDS.includes(k)) data[k] = parseFloat(v);
                else if (k === 'date') data[k] = new Date(v).toISOString();
                else data[k] = v;
            }
            return data;
        }

        // ----- sites -----
        async function loadSites() {
            const sites = await api('/sites');
            document.getElementById('sites-list').innerHTML = sites.length === 0
                ? '<p class="text-cyan-100">No sites yet.</p>'
                : sites.map(s => `<div class="list-item">
                    <strong>${s.name}</strong>${s.country ? ` · ${s.country}` : ''}${s.typical_max_depth_m ? ` · ~${s.typical_max_depth_m}m` : ''}
                    ${s.marine_life ? `<br /><span class="text-xs text-cyan-100">${s.marine_life}</span>` : ''}
                </div>`).join('');
            // populate dive form site dropdown
            const opts = '<option value="">--</option>' + sites.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
            document.getElementById('dive-site-select').innerHTML = opts;
        }

        document.getElementById('site-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                await api('/sites', { method: 'POST', body: JSON.stringify(formToObj(e.target)) });
                e.target.reset();
                await loadSites();
            } catch (err) { alert('Error: ' + err.message); }
        });

        // ----- divers -----
        async function loadDivers() {
            const divers = await api('/divers');
            document.getElementById('divers-list').innerHTML = divers.length === 0
                ? '<p class="text-cyan-100">No divers yet.</p>'
                : divers.map(d => `<div class="list-item">
                    <strong>${d.name}</strong>${d.cert_level ? ` · ${d.cert_level}` : ''}${d.school ? ` · ${d.school}` : ''}
                </div>`).join('');
            const opts = '<option value="">--</option>' + divers.map(d => `<option value="${d.id}">${d.name}</option>`).join('');
            document.getElementById('dive-diver-select').innerHTML = opts;
            document.getElementById('stats-diver-select').innerHTML = opts;
        }

        document.getElementById('diver-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                await api('/divers', { method: 'POST', body: JSON.stringify(formToObj(e.target)) });
                e.target.reset();
                await loadDivers();
            } catch (err) { alert('Error: ' + err.message); }
        });

        // ----- dives -----
        async function loadDives() {
            const [dives, sites, divers] = await Promise.all([api('/dives'), api('/sites'), api('/divers')]);
            const siteMap = Object.fromEntries(sites.map(s => [s.id, s.name]));
            const diverMap = Object.fromEntries(divers.map(d => [d.id, d.name]));
            document.getElementById('dives-list').innerHTML = dives.length === 0
                ? '<p class="text-cyan-100">No dives logged yet.</p>'
                : dives.map(d => {
                    const date = new Date(d.date).toLocaleDateString();
                    const stars = d.rating ? '<span class="rating">' + '★'.repeat(d.rating) + '</span>' : '';
                    return `<div class="list-item">
                        <div><strong>${siteMap[d.site_id] || ('Site ' + d.site_id)}</strong> · ${date} ${stars}</div>
                        <div class="text-xs text-cyan-100">${diverMap[d.diver_id] || ('Diver ' + d.diver_id)} · ${d.duration_min}min · max ${d.max_depth_m}m${d.gas_mix ? ' · ' + d.gas_mix : ''}</div>
                        ${d.notes ? `<div class="text-xs italic mt-1">"${d.notes}"</div>` : ''}
                    </div>`;
                }).join('');
        }

        document.getElementById('dive-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                await api('/dives', { method: 'POST', body: JSON.stringify(formToObj(e.target)) });
                e.target.reset();
                await loadDives();
            } catch (err) { alert('Error: ' + err.message); }
        });

        // ----- stats -----
        document.getElementById('stats-btn').addEventListener('click', async () => {
            const id = document.getElementById('stats-diver-select').value;
            if (!id) return;
            try {
                const stats = await api(`/divers/${id}/stats`);
                document.getElementById('stats-output').innerHTML = `
                    <div class="grid grid-cols-2 md:grid-cols-3 gap-3">
                        <div class="list-item"><div class="text-xs text-cyan-100">Total Dives</div><div class="text-2xl font-bold">${stats.total_dives}</div></div>
                        <div class="list-item"><div class="text-xs text-cyan-100">Total Bottom Time</div><div class="text-2xl font-bold">${stats.total_bottom_time_min || 0} min</div></div>
                        <div class="list-item"><div class="text-xs text-cyan-100">Avg Max Depth</div><div class="text-2xl font-bold">${stats.avg_max_depth_m || '-'} m</div></div>
                        <div class="list-item"><div class="text-xs text-cyan-100">Avg Gas Used</div><div class="text-2xl font-bold">${stats.avg_gas_consumed_bar || '-'} bar</div></div>
                        <div class="list-item"><div class="text-xs text-cyan-100">Avg Rating</div><div class="text-2xl font-bold rating">${stats.avg_rating ? '★'.repeat(Math.round(stats.avg_rating)) + ' ' + stats.avg_rating : '-'}</div></div>
                    </div>`;
            } catch (err) { alert('Error: ' + err.message); }
        });

        // ----- boot -----
        loadSites();
        loadDivers();
        loadDives();
    </script>
</body>
</html>
